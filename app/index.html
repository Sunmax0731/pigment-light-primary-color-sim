<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>顔料と光の三原色シミュレーター</title><link rel="stylesheet" href="./styles.css"></head>
<body><main class="workspace" data-smoke-root><section class="control-panel"><p class="eyebrow">Game / v0.1.0-alpha.1</p><h1>顔料と光の三原色シミュレーター</h1><p class="summary">顔料を溶かした絵の具を混ぜる減法混色と、照明を重ねる加法混色を、流体、拡散、濃度、照射範囲の物理シミュレーションを使って学ぶ。課題モードでは指定色を顔料や光で再現し、混色過程、RGB/CMYK、補色、明度、彩度の違いを観察できる。</p><div class="actions"><button type="button" data-primary-action>Run alpha scenario</button><button type="button" data-secondary-action>Show manual checks</button></div></section><section class="status-grid" data-status-grid></section><section class="visual-stage" data-visual-stage><img src="./assets/alpha-visual.svg" alt="pigment-light-primary-color-sim alpha visual"><div class="stage-readout" data-stage-readout>Ready</div></section></main><script type="module" src="./main.mjs"></script></body></html>
